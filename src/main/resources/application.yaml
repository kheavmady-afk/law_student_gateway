server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://192.168.0.179:8081}
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://192.168.0.20:8082}
          predicates:
            - Path=/api/v1/**
          filters:
            - name: AuthFilter

# PRODUCTION SECRETS
internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET:PROD_GATEWAY_SECRET_KEY_12345}
  # Changed variable name to AUTH_VALIDATION_URL to avoid collision
  auth-service-url: ${AUTH_VALIDATION_URL:http://192.168.0.179:8081/auth}

logging:
  level:
    com.kheavmady.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.server.HttpServerOperations: ERROR
