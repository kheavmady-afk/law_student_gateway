server:
  port: 8080

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST:192.168.0.179}
      port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://192.168.0.179:8081}
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL:http://192.168.0.20:8082}
          predicates:
            - Path=/api/v1/**
          filters:
            - name: AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: doc-hub-system
          uri: ${DOC_HUB_GATEWAY_URL:http://192.168.0.238:9090}
          predicates:
            - Path=/api/docs/**, /api/search/**, /api/download/**, /api/share/**, /api/feed/**
          filters:
            - name: AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

# PRODUCTION SECRETS
internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET:PROD_GATEWAY_SECRET_KEY_12345}
  # Changed variable name to AUTH_VALIDATION_URL to avoid collision
  auth-service-url: ${AUTH_VALIDATION_URL:http://192.168.0.179:8081/auth}

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437} # Use the same secret as auth-service

logging:
  level:
    com.kheavmady.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.server.HttpServerOperations: ERROR
