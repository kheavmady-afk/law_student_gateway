server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/**
          filters:
            - AuthenticationFilter

# PRODUCTION SECRETS
internal:
  gateway-secret: "PROD_GATEWAY_SECRET_KEY_12345"

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG