server:
  port: 8080

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/auth/**

        - id: user-service
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/v1/**
          filters:
            - name: AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: doc-hub-system
          uri: ${DOC_HUB_GATEWAY_URL}
          predicates:
            - Path=/api/docs/**, /api/search/**, /api/download/**, /api/share/**, /api/feed/**
          filters:
            - name: AuthFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

# PRODUCTION SECRETS
internal:
  gateway-secret: ${INTERNAL_GATEWAY_SECRET}
  auth-service-url: ${AUTH_VALIDATION_URL}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.kheavmady.gateway: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.server.HttpServerOperations: ERROR
